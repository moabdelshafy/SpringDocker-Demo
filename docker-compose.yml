services:

  app:
    image: shefoo/spring-docker-demo:v1.0
    ports:
      - "9090:9090"
    depends_on:
      - db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/docker?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: shefoo
      SPRING_DATASOURCE_PASSWORD: shefoo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  redis:
    image: redis:7
    ports:
      - "6378:6379"

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: shefoo
      MYSQL_DATABASE: docker
      MYSQL_USER: shefoo
      MYSQL_PASSWORD: shefoo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: